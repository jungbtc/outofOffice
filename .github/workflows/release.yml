name: Windows release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: cargo test --workspace
      - run: pnpm tauri build
        env:
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
      - name: Prepare release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          $installer = Get-ChildItem target/release/bundle/nsis -Filter "*-setup.exe" | Select-Object -First 1
          if (-not $installer) { throw "NSIS installer was not generated" }
          Copy-Item -LiteralPath $installer.FullName -Destination "artifacts/outofOffice_0.1.0_x64-setup.exe"
          Copy-Item -LiteralPath "target/release/outofOffice.exe" -Destination "artifacts/outofOffice.exe"
          Get-FileHash artifacts/* -Algorithm SHA256 | ForEach-Object { "$($_.Hash)  $(Split-Path $_.Path -Leaf)" } | Set-Content artifacts/SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: true
          files: artifacts/*
