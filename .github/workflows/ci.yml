name: Windows CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  verify-and-build:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify TypeScript and formatting
        run: |
          pnpm typecheck
          pnpm lint
          pnpm format:check
      - name: Unit tests
        run: pnpm test
      - name: Playwright browser
        run: pnpm exec playwright install chromium
      - name: End-to-end tests
        run: pnpm test:e2e
      - name: Verify Rust
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace
      - name: Dependency audit
        run: pnpm audit --prod
      - name: Dependency licenses
        run: pnpm run licenses
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Windows NSIS installer
        run: pnpm tauri build
      - name: Stage installer with stable name
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          $installer = Get-ChildItem target/release/bundle/nsis -Filter "*-setup.exe" | Select-Object -First 1
          if (-not $installer) { throw "NSIS installer was not generated" }
          Copy-Item -LiteralPath $installer.FullName -Destination "artifacts/outofOffice_0.1.0_x64-setup.exe"
          Copy-Item -LiteralPath "target/release/outofOffice.exe" -Destination "artifacts/outofOffice.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: outofOffice-windows-x64
          path: artifacts/*
          if-no-files-found: error
